services:
  - type: web
    name: rasem7-veloura-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: ADMIN_REGISTRATION_CODE
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
